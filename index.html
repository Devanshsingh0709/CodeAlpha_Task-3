<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Music Player</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

    <div class="player">

        <!-- Album Cover -->
        <div class="cover">
            <img id="cover" src="assets/images/cover1.jpg" alt="Album Cover">
        </div>

        <!-- Song Information -->
        <div class="song-info">
            <h2 id="title">Song Title</h2>
            <p id="artist">Artist Name</p>
        </div>

        <!-- Progress -->
        <div class="progress-area">

            <span id="current">0:00</span>

            <input
                type="range"
                id="progress"
                value="0"
                min="0"
                max="100">

            <span id="duration">0:00</span>

        </div>

        <!-- Controls -->
        <div class="controls">

            <button id="prev">
                <i class="fa-solid fa-backward"></i>
            </button>

            <button id="play">
                <i class="fa-solid fa-play"></i>
            </button>

            <button id="next">
                <i class="fa-solid fa-forward"></i>
            </button>

        </div>

        <!-- Volume -->
        <div class="volume">

            <i class="fa-solid fa-volume-high"></i>

            <input
                type="range"
                id="volume"
                min="0"
                max="1"
                step="0.01"
                value="1">

        </div>

        <!-- Playlist -->
        <div class="playlist">

            <h3>Playlist</h3>

            <ul id="playlist">

                <li data-index="0" class="active">
                    🎵 Song One
                </li>

                <li data-index="1">
                    🎵 Song Two
                </li>

                <li data-index="2">
                    🎵 Song Three
                </li>

                <li data-index="3">
                    🎵 Song Four
                </li>

            </ul>

        </div>

    </div>

    <!-- Hidden Audio -->
    <audio id="audio"></audio>

    <script src="script.js"></script>

</body>

</html>
